<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourMajor Logo — Laurel &amp; Flag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      padding: 40px 20px;
    }
    .page-title {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
      font-weight: 700;
      color: #1A3260;
      font-family: 'Playfair Display', Georgia, serif;
      letter-spacing: 2px;
    }
    .page-subtitle {
      text-align: center;
      margin-bottom: 50px;
      font-size: 14px;
      color: #999;
    }
    .preview-section {
      max-width: 900px;
      margin: 0 auto 40px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    .preview-label {
      padding: 12px 24px;
      background: #1A3260;
      color: #DAA520;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .preview-area {
      padding: 60px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-area.dark {
      background: #1A3260;
    }
    .preview-area.gray {
      background: #e8e8e3;
    }
    .preview-area img {
      width: 100%;
      max-width: 540px;
      height: auto;
    }
  </style>
</head>
<body>

  <h1 class="page-title">YOURMAJOR</h1>
  <p class="page-subtitle">Laurel &amp; Flag — Logo Iteration</p>

  <div class="preview-section">
    <div class="preview-label">On White</div>
    <div class="preview-area">
      <img src="logo-2-laurel-flag.svg" alt="YourMajor Logo on white">
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-label">On Light Gray</div>
    <div class="preview-area gray">
      <img src="logo-2-laurel-flag.svg" alt="YourMajor Logo on gray">
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-label">On Dark</div>
    <div class="preview-area dark">
      <img src="logo-2-laurel-flag-dark.svg" alt="YourMajor Logo on dark">
    </div>
  </div>

  <h1 class="page-title" style="margin-top:60px">EAGLE FLAGS</h1>
  <p class="page-subtitle">Three waving flags over double gold circle</p>

  <div class="preview-section">
    <div class="preview-label">On White</div>
    <div class="preview-area">
      <img src="eagle-flags.svg" alt="Eagle Flags" style="max-width:250px">
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-label">On Dark Green</div>
    <div class="preview-area" style="background:#006747">
      <img src="eagle-flags-dark.svg" alt="Eagle Flags on dark green" style="max-width:250px">
    </div>
  </div>

</body>
</html>
